<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 240" width="100%" height="100%">
  <defs>
    <!-- Glow filter -->
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1" />
      <feGaussianBlur stdDeviation="10" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Front face gradient (pink to purple) -->
    <linearGradient id="front-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff99dd" />
      <stop offset="50%" stop-color="#d666ff" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Side walls gradient (dark violet) -->
    <linearGradient id="side-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a189a" />
      <stop offset="100%" stop-color="#3c096c" />
    </linearGradient>

    <!-- Tip gradient (cyan neon glow) -->
    <linearGradient id="tip-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff" />
      <stop offset="100%" stop-color="#0088cc" />
    </linearGradient>

    <!-- Text gradient (cyan to purple) -->
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffff" />
      <stop offset="100%" stop-color="#d666ff" />
    </linearGradient>
  </defs>

  <!-- Group for icon -->
  <g transform="translate(60, 10) scale(0.9) rotate(-15 90 90)">
    
    <!-- Shadow -->
    <path d="M 50,50 C 10,50 10,150 50,150 L 120,150 L 120,120 L 50,120 C 35,120 35,80 50,80 L 120,80 L 120,50 Z" 
          fill="#000000" opacity="0.4" filter="url(#neon-glow)" transform="translate(15, 25)" />

    <!-- Back face -->
    <path d="M 60,60 C 20,60 20,160 60,160 L 130,160 L 130,130 L 60,130 C 45,130 45,90 60,90 L 130,90 L 130,60 Z" 
          fill="#240046" />

    <!-- Connecting Side Walls -->
    <path d="M 50,50 L 60,60 C 20,60 20,160 60,160 L 50,150 C 10,150 10,50 50,50 Z" fill="url(#side-gradient)" />
    <path d="M 50,80 L 60,90 C 45,90 45,130 60,130 L 50,120 C 35,120 35,80 50,80 Z" fill="#1e0035" />
    <path d="M 50,50 L 120,50 L 130,60 L 60,60 Z" fill="url(#side-gradient)" />
    <path d="M 50,150 L 120,150 L 130,160 L 60,160 Z" fill="#240046" />
    <path d="M 50,80 L 120,80 L 130,90 L 60,90 Z" fill="#1e0035" />
    <path d="M 50,120 L 120,120 L 130,130 L 60,130 Z" fill="url(#side-gradient)" />

    <!-- Front Face -->
    <path d="M 50,50 C 10,50 10,150 50,150 L 120,150 L 120,120 L 50,120 C 35,120 35,80 50,80 L 120,80 L 120,50 Z" 
          fill="url(#front-gradient)" stroke="#ffb7ff" stroke-width="1.5" />

    <!-- Glowing tips (Magnetic Poles) -->
    <path d="M 120,50 L 120,80 L 105,80 L 105,50 Z" fill="url(#tip-gradient)" stroke="#e0ffff" stroke-width="1" />
    <path d="M 120,120 L 120,150 L 105,150 L 105,120 Z" fill="url(#tip-gradient)" stroke="#e0ffff" stroke-width="1" />

    <!-- Tip 3D extrusions -->
    <path d="M 120,50 L 130,60 L 130,90 L 120,80 Z" fill="#00b3b3" />
    <path d="M 120,120 L 130,130 L 130,160 L 120,150 Z" fill="#00b3b3" />

    <!-- Lightning bolts -->
    <path d="M 130,55 L 155,40 L 145,58 L 165,55 L 135,78 L 142,62 Z" fill="#00ffff" filter="url(#neon-glow)" opacity="0.9" />
    <path d="M 125,75 L 142,75 L 135,85 L 150,83 L 130,98 L 135,88 Z" fill="#cc66ff" filter="url(#neon-glow)" opacity="0.8" />
    <path d="M 130,135 L 155,120 L 145,138 L 165,135 L 135,158 L 142,142 Z" fill="#00ffff" filter="url(#neon-glow)" opacity="0.9" />
    <path d="M 125,145 L 142,145 L 135,155 L 150,153 L 130,168 L 135,158 Z" fill="#cc66ff" filter="url(#neon-glow)" opacity="0.8" />
  </g>

  <!-- Text -->
  <text x="150" y="215" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="34" font-weight="900" text-anchor="middle" letter-spacing="1">
    <tspan fill="#ffffff">avante</tspan><tspan fill="url(#text-gradient)">.digital</tspan>
  </text>
</svg>
